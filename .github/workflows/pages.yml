name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy should run at a time, but don't cancel one that's
# already in progress - let it finish rather than publishing half a deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      # v3 (and older) intermittently fail deploy-pages with "No artifacts
      # named github-pages were found" - the artifact upload/retrieval
      # mechanism they use internally is too old. include-hidden-files
      # keeps docs/.nojekyll in the uploaded artifact, since v4+ excludes
      # dotfiles by default.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
